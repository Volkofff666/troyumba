services:
  backend:
    build: ./backend
    container_name: troymba-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      # SQLite database stored outside the container
      - ./backend/data:/app/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: troymba-caddy
    restart: unless-stopped
    ports:
      - "80:80"   # Cloudflare proxy forwards HTTPS traffic here as HTTP
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - .:/srv/frontend:ro         # static files (html, css, js)
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
