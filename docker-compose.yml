services:
  backend:
    build: ./backend
    container_name: troymba-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend/data:/app/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: troymba-caddy
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "80:80"    # HTTP + Let's Encrypt ACME challenge
      - "443:443"  # HTTPS
      - "443:443/udp"  # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - .:/srv/frontend:ro
      - caddy_data:/data    # TLS certificates
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
