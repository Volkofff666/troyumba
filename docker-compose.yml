services:
  backend:
    build: ./backend
    container_name: troymba-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      # SQLite база данных — хранится вне контейнера
      - ./backend/data:/app/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: troymba-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"    # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - .:/srv/frontend:ro         # статика (html, css, js)
      - caddy_data:/data           # сертификаты Let's Encrypt
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
