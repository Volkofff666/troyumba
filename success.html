<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Оплата прошла успешно — Troymba</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .result-page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: var(--c-bg);
    }
    .result-card {
      background: white;
      border: 1px solid var(--c-border);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-xl);
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .result-icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--c-success-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      color: var(--c-success);
      margin: 0 auto 2rem;
    }
    .result-title {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      color: var(--c-text);
    }
    .result-desc {
      font-size: 1rem;
      color: var(--c-text-muted);
      line-height: 1.65;
      margin-bottom: 2rem;
    }
    .result-btns {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    @media (min-width: 400px) {
      .result-btns { flex-direction: row; justify-content: center; }
    }
    .order-id-box {
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: var(--r-md);
      padding: 0.875rem 1.25rem;
      font-size: 0.85rem;
      color: var(--c-text-muted);
      margin-bottom: 2rem;
      word-break: break-all;
    }
    .order-id-box strong { color: var(--c-text); display: block; margin-bottom: 0.25rem; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; }
  </style>
</head>
<body>
  <div class="result-page">
    <div class="result-card">
      <div class="result-icon">
        <i class="fas fa-check"></i>
      </div>
      <h1 class="result-title">Оплата прошла успешно!</h1>
      <p class="result-desc">
        Ваш платёж подтверждён. Мы уже обрабатываем заказ.<br>
        API ключ будет выдан в течение нескольких минут.
      </p>

      <div class="order-id-box" id="orderInfo" style="display:none">
        <strong>Номер заказа</strong>
        <span id="orderIdDisplay">—</span>
      </div>

      <div class="result-btns">
        <a href="account.html" class="btn btn-primary">
          <i class="fas fa-user"></i> Личный кабинет
        </a>
        <a href="index.html" class="btn btn-ghost">
          На главную
        </a>
      </div>
    </div>

    <p style="margin-top:1.5rem; font-size:0.82rem; color:var(--c-text-muted); text-align:center;">
      Вопросы? <a href="mailto:support@troyumba.ru" style="color:var(--c-primary);">support@troyumba.ru</a>
    </p>
  </div>

  <script>
    // Показать MERCHANT_ORDER_ID из query params если есть
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('MERCHANT_ORDER_ID') || params.get('order_id');
    if (orderId) {
      document.getElementById('orderIdDisplay').textContent = orderId;
      document.getElementById('orderInfo').style.display = 'block';
    }
  </script>
</body>
</html>
